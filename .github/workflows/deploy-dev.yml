name: Deploy to Dev

on:
  push:
    branches:
      - dev

jobs:
  checks:
    name: Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Lint
        run: pnpm lint

  deploy-db:
    name: Migrate Supabase (Dev)
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to dev
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_PASSWORD: ${{ secrets.SUPABASE_DEV_DB_PASSWORD }}
          PROJECT_REF: ${{ secrets.SUPABASE_DEV_PROJECT_REF }}
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --linked --password "$DB_PASSWORD"

  deploy-worker:
    name: Deploy Cloudflare Worker (Dev)
    runs-on: ubuntu-latest
    needs: deploy-db
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm opennextjs-cloudflare build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_DEV_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_DEV_ANON_KEY }}

      - name: Deploy to Cloudflare (dev)
        run: pnpm wrangler deploy --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Print Preview URL
        run: echo "🚀 Dev URL → https://euger-dev.${{ secrets.CLOUDFLARE_SUBDOMAIN }}.workers.dev"
