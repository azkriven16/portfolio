name: Deploy to Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy-db:
    name: Migrate Supabase (Dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to dev
        run: |
          ENCODED_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ secrets.SUPABASE_DEV_DB_PASSWORD }}'))")
          supabase db push --db-url "postgresql://postgres.${{ secrets.SUPABASE_DEV_PROJECT_REF }}:${ENCODED_PASSWORD}@aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres"

  deploy-worker:
    name: Deploy Cloudflare Worker (Dev)
    runs-on: ubuntu-latest
    needs: deploy-db
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm opennextjs-cloudflare build

      - name: Deploy to Cloudflare (dev)
        run: pnpm wrangler deploy --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
